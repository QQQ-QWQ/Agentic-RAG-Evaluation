config_name: c1_rewrite
display_name: "C1 Query Rewrite RAG"
description: "在 C0 基础上只优化 query rewrite：检索式 Prompt v2、多候选检索 query、保守改写判断。"

base_config: "c0_naive"
stage: "retrieval_query_enhancement"

modules:
  document_parse: true
  chunking: true
  vector_retrieval: true
  bm25_retrieval: false
  hybrid_retrieval: false
  query_rewrite: true
  rerank: false
  task_planning: false
  multi_round_retrieval: false
  tool_calling: false
  self_check: false

query_rewrite:
  prompt_file: "prompts/query_rewrite_prompt.md"
  version: "prompt-v2"
  rewrite_when:
    - fuzzy_query
    - colloquial_expression
    - omitted_subject
    - mixed_chinese_english
    - multi_doc_comparison
  keep_original_query: true
  retrieval_query_strategy: "original_plus_multi_candidate_rewritten"
  max_rewritten_queries: 4
  min_rewrite_confidence: 0.55
  conservative_rewrite: true

retrieval:
  chunk_size: 500
  chunk_overlap: 80
  top_k: 5
  score_type: "cosine_similarity"

output_extra_fields:
  - need_rewrite
  - rewrite_confidence
  - rewrite_reason
  - rewritten_query
  - rewritten_queries

logging:
  save_jsonl: true
  fields:
    - run_id
    - config
    - question_id
    - original_query
    - need_rewrite
    - rewrite_confidence
    - rewrite_reason
    - rewritten_query
    - rewritten_queries
    - retrieved_chunks
    - answer
    - citations
    - latency_ms
    - token_cost
    - error

evaluation_focus:
  - Rewrite Validity
  - Recall@5
  - Answer Correctness
  - Citation Accuracy
