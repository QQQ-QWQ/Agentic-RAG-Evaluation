config_name: c2_advanced
display_name: "C2 Advanced RAG"
description: "在 C1 基础上加入 BM25、混合检索和 rerank，提升证据召回和排序质量。"

base_config: "c1_rewrite"
stage: "advanced_retrieval"

modules:
  document_parse: true
  chunking: true
  vector_retrieval: true
  bm25_retrieval: true
  hybrid_retrieval: true
  query_rewrite: true
  rerank: true
  task_planning: false
  multi_round_retrieval: false
  tool_calling: false
  self_check: false

retrieval:
  chunk_size: 500
  chunk_overlap: 80
  vector_top_k: 10
  bm25_top_k: 10
  merged_top_k: 20
  final_top_k: 5

hybrid_retrieval:
  vector_weight: 0.6
  bm25_weight: 0.4
  deduplicate_by: "chunk_id"

rerank:
  enabled: true
  rerank_top_n: 20
  final_top_k: 5
  model: "${RERANK_MODEL}"

output_extra_fields:
  - vector_hits
  - bm25_hits
  - merged_candidates
  - reranked_chunks

logging:
  save_jsonl: true
  fields:
    - run_id
    - config
    - question_id
    - original_query
    - rewritten_query
    - vector_hits
    - bm25_hits
    - merged_candidates
    - reranked_chunks
    - answer
    - citations
    - latency_ms
    - token_cost
    - error

evaluation_focus:
  - Recall@5
  - MRR@10
  - nDCG@10
  - Answer Correctness
  - Citation Accuracy
  - Latency
